name: CI Pipeline

on:
  push:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t devops-service -f docker/Dockerfile .

      - name: Run container
        run: docker run -d -p 8000:8000 --name devops-test devops-service

      - name: Wait for app to start
        run: sleep 5

      - name: Test endpoints
        run: |
          curl -s http://localhost:8000/ | grep "Service is running"
          curl -s http://localhost:8000/metrics | grep "app_requests_total"
          curl -s -X POST http://localhost:8000/tasks
          curl -s http://localhost:8000/tasks | grep "created"

      - name: Cleanup
        if: always()
        run: docker rm -f devops-test || true
